<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Risco - São Paulo Tech School</title>
</head>
<body>
    <h1>Calculadora de Risco de Data Center</h1> 
    <p>Descubra o risco financeiro de não monitorar sua infraestrutura.</p>
    <br>

    Informe a quantidade de servidores na sala: 
    <input id="qtd_servidores" type="number"><br><br>

    Informe o valor médio de cada servidor (R$): 
    <input id="valor_servidor" type="number"><br><br>

    Informe a temperatura atual da sala (°C): 
    <input id="temperatura" type="number"><br><br>

    <button onclick="simularRisco()">Calcular Risco de Prejuízo</button>
    
    <br><br>
    <div id="msg"></div>

    <script>
        function simularRisco() {
            // Pegando os valores digitados pelo usuário
            let qtd = Number(qtd_servidores.value);
            let valor = Number(valor_servidor.value);
            let temp = Number(temperatura.value);

            // Calculando o patrimônio total
            let patrimonioTotal = qtd * valor;
            let limiteSeguro = 27; 

            // Limpando a div e mostrando o total investido
            msg.innerHTML = `<strong>Resumo:</strong> Você tem um patrimônio de <b>R$ ${patrimonioTotal.toFixed(2)}</b> operando na sala.<br><br>`;

            // Lógica de Risco
            if (temp >= 18 && temp <= limiteSeguro) {
                div_msg.innerHTML += `<span style="color: green;">Sua temperatura de ${temp}°C está no padrão ideal.<br>Mas lembre-se: falhas no ar-condicionado ocorrem sem aviso! Proteja seu investimento com nosso sistema.</span>`;
            
            } else if (temp > limiteSeguro) {
                // Se a temperatura passar de 27, calculamos um "risco de falha"
                let grausAcima = temp - limiteSeguro;
                
                // Exemplo: cada grau acima do ideal aumenta o risco de falha em 5%
                let riscoPercentual = grausAcima * 5; 
                if (riscoPercentual > 100) {
                    riscoPercentual = 100;
                }

                // Calcula quanto em dinheiro está em risco
                let dinheiroEmRisco = (patrimonioTotal * riscoPercentual) / 100;

                msg.innerHTML += `<span style="color: red;"><strong>ALERTA DE RISCO!</strong><br>
                Sua temperatura de ${temp}°C está ${grausAcima}°C acima do limite seguro! <br>
                Isso gera um risco de falha por superaquecimento de <b>${riscoPercentual}%</b>.<br>
                <strong>Prejuízo estimado em caso de parada: R$ ${dinheiroEmRisco.toFixed(2)}</strong><br><br>
                Vale a pena arriscar R$ ${dinheiroEmRisco.toFixed(2)} ao invés de investir em nosso sistema de monitoramento?</span>`;
            
            } else {
                msg.innerHTML += `<span style="color: orange;">Sua temperatura de ${temp}°C está muito fria (abaixo de 18°C). Isso pode gerar condensação e queimar equipamentos. Assine nosso sistema de alertas!</span>`;
            }
        }
    </script>
</body>
</html>
